name: Job Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */12 * * *"

concurrency:
  group: job-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      JOB_SCRAPER_EMAIL: ${{ secrets.JOB_SCRAPER_EMAIL }}
      JOB_SCRAPER_APP_PASSWORD: ${{ secrets.JOB_SCRAPER_APP_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RECIPIENT_PROFILES_JSON: ${{ secrets.RECIPIENT_PROFILES_JSON }}
      SPONSOR_COMPANIES_CSV_TEXT: ${{ secrets.SPONSOR_COMPANIES_CSV_TEXT }}
      ASHBY_COMPANIES_JSON: ${{ vars.ASHBY_COMPANIES_JSON }}
      GREENHOUSE_BOARD_TOKENS_JSON: ${{ vars.GREENHOUSE_BOARD_TOKENS_JSON }}
      LEVER_COMPANIES_JSON: ${{ vars.LEVER_COMPANIES_JSON }}
      NEXTJS_URLS_JSON: ${{ vars.NEXTJS_URLS_JSON }}
      SPONSOR_COMPANIES_CSV: ${{ vars.SPONSOR_COMPANIES_CSV }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python run_all.py
