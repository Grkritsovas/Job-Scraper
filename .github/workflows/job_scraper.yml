name: Job Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9,16 * * *"
    - cron: "0 0,3,12,14,20 * * *"

concurrency:
  group: job-scraper
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      JOB_SCRAPER_EMAIL: ${{ secrets.JOB_SCRAPER_EMAIL }}
      JOB_SCRAPER_APP_PASSWORD: ${{ secrets.JOB_SCRAPER_APP_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ASHBY_COMPANIES_JSON: ${{ vars.ASHBY_COMPANIES_JSON }}
      GREENHOUSE_BOARD_TOKENS_JSON: ${{ vars.GREENHOUSE_BOARD_TOKENS_JSON }}
      LEVER_COMPANIES_JSON: ${{ vars.LEVER_COMPANIES_JSON }}
      NEXTJS_URLS_JSON: ${{ vars.NEXTJS_URLS_JSON }}
      SPONSOR_COMPANIES_CSV: ${{ vars.SPONSOR_COMPANIES_CSV }}
      JOB_SCRAPER_LLM_MODEL: ${{ vars.JOB_SCRAPER_LLM_MODEL }}
      JOB_SCRAPER_LLM_TOP_N: ${{ vars.JOB_SCRAPER_LLM_TOP_N }}
      JOB_SCRAPER_LLM_BATCH_SIZE: ${{ vars.JOB_SCRAPER_LLM_BATCH_SIZE }}
      JOB_SCRAPER_LLM_DESCRIPTION_CHARS: ${{ vars.JOB_SCRAPER_LLM_DESCRIPTION_CHARS }}
      JOB_SCRAPER_SUPPORT_BACKLOG_HOURS: ${{ vars.JOB_SCRAPER_SUPPORT_BACKLOG_HOURS }}


    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install support check dependency
        if: github.event_name == 'schedule' && github.event.schedule == '0 0,3,12,14,20 * * *'
        run: pip install "psycopg[binary]>=3.2,<4"

      - name: Check support backlog
        id: support_backlog
        if: github.event_name == 'schedule' && github.event.schedule == '0 0,3,12,14,20 * * *'
        run: python check_review_backlog.py

      - name: Skip empty support run
        if: github.event_name == 'schedule' && github.event.schedule == '0 0,3,12,14,20 * * *' && steps.support_backlog.outputs.should_run != 'true'
        run: echo "No recent pending job backlog; skipping scraper."

      - name: Install dependencies
        if: github.event_name != 'schedule' || github.event.schedule == '30 9,16 * * *' || steps.support_backlog.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run scraper
        if: github.event_name != 'schedule' || github.event.schedule == '30 9,16 * * *'
        run: python run_all.py

      - name: Run support scraper
        if: github.event_name == 'schedule' && github.event.schedule == '0 0,3,12,14,20 * * *' && steps.support_backlog.outputs.should_run == 'true'
        run: python run_all.py --support-run
