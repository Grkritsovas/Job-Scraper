name: Job Scraper

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9,16 * * *"

concurrency:
  group: job-scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      JOB_SCRAPER_EMAIL: ${{ secrets.JOB_SCRAPER_EMAIL }}
      JOB_SCRAPER_APP_PASSWORD: ${{ secrets.JOB_SCRAPER_APP_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SPONSOR_COMPANIES_CSV_TEXT: ${{ secrets.SPONSOR_COMPANIES_CSV_TEXT }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ASHBY_COMPANIES_JSON: ${{ vars.ASHBY_COMPANIES_JSON }}
      GREENHOUSE_BOARD_TOKENS_JSON: ${{ vars.GREENHOUSE_BOARD_TOKENS_JSON }}
      LEVER_COMPANIES_JSON: ${{ vars.LEVER_COMPANIES_JSON }}
      NEXTJS_URLS_JSON: ${{ vars.NEXTJS_URLS_JSON }}
      SPONSOR_COMPANIES_CSV: ${{ vars.SPONSOR_COMPANIES_CSV }}
      JOB_SCRAPER_LLM_MODEL: ${{ vars.JOB_SCRAPER_LLM_MODEL }}
      JOB_SCRAPER_LLM_TOP_N: ${{ vars.JOB_SCRAPER_LLM_TOP_N }}
      JOB_SCRAPER_LLM_BATCH_SIZE: ${{ vars.JOB_SCRAPER_LLM_BATCH_SIZE }}
      JOB_SCRAPER_LLM_DESCRIPTION_CHARS: ${{ vars.JOB_SCRAPER_LLM_DESCRIPTION_CHARS }}
      JOB_SCRAPER_MAX_SEMANTIC_EMAIL_JOBS: ${{ vars.JOB_SCRAPER_MAX_SEMANTIC_EMAIL_JOBS }}


    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python run_all.py
